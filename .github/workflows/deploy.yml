name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install
      # --- Security checks ---
      - name: Install Gitleaks binary
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks-linux-amd64 -o gitleaks
          chmod +x gitleaks
      - name: Dependency audit (high severity)
        run: npm run audit
      - name: ESLint linting
        run: npm run lint
      - name: Secret scanning (Gitleaks)
        run: ./gitleaks detect --source . --redact --report-path=gitleaks-report.json
      - name: Build Eleventy site
        run: npm run build
      # --- HTML validation ---
      - name: Validate generated HTML
        run: npm run html-validate

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
